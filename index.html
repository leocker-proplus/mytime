<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光回忆馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: '#c9a88e',
                        darkBg: '#121218',
                        darkCard: '#1e1e2f'
                    },
                    fontFamily: {
                        grace: ['"Segoe UI"', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * {
            scroll-behavior: smooth;
        }
        body {
            background: linear-gradient(120deg, #fef6f0, #f5ebe4);
            background-attachment: fixed;
        }
        .dark body {
            background: linear-gradient(120deg, #121218, #191928);
        }
        .glass {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .dark .glass {
            background: rgba(30,30,47,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.2,0,0.2,1);
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(201,168,142,0.25);
        }
        .dark .card-hover:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .timeline-dot {
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:0.7; transform:scale(1); }
            50% { opacity:1; transform:scale(1.15); }
        }
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c9a88e; border-radius: 3px; }
        /* 图片放大弹窗 */
        .img-modal {
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>
<body class="font-grace text-gray-700 dark:text-gray-200 transition-colors duration-500">
    <!-- 导航栏 -->
    <nav class="glass sticky top-0 z-50 px-4 py-3 rounded-b-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-main dark:text-amber-200">
                <i class="fa fa-heart mr-2"></i>时光回忆馆
            </h1>
            <div class="flex gap-3 items-center">
                <button onclick="toggleDark()" class="w-9 h-9 rounded-full glass flex items-center justify-center">
                    <i class="fa fa-moon-o dark:hidden"></i>
                    <i class="fa fa-sun-o hidden dark:block"></i>
                </button>
                <button onclick="refreshData()" class="px-4 py-2 rounded-lg glass">
                    <i class="fa fa-refresh mr-1"></i>刷新
                </button>
            </div>
        </div>
    </nav>

    <!-- 头部介绍 -->
    <header class="max-w-6xl mx-auto px-4 py-10 text-center fade-in">
        <h2 class="text-[clamp(1.8rem,4vw,2.8rem)] font-bold mb-3 bg-gradient-to-r from-main to-rose-400 bg-clip-text text-transparent">
            珍藏每一段温柔时光
        </h2>
        <p class="opacity-70">私人整理回忆 · 仅浏览展示 · 国内高速加载</p>
    </header>

    <!-- 主内容时间线 -->
    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div id="loading" class="text-center py-20 text-lg opacity-70">
            <i class="fa fa-spinner fa-spin mr-2"></i>正在加载回忆...
        </div>
        <div id="emptyTip" class="hidden text-center py-20 opacity-60">
            <i class="fa fa-calendar-o text-5xl mb-4"></i>
            <p>暂未收录回忆，请管理员更新仓库数据</p>
        </div>
        <div id="memoryBox" class="relative space-y-10 pl-8">
            <div class="absolute left-[7px] top-0 bottom-0 w-[2px] bg-gradient-to-b from-main/60 to-transparent"></div>
        </div>
    </main>

    <!-- 图片全屏预览弹窗 -->
    <div id="imgModal" class="img-modal fixed inset-0 z-[100] hidden flex items-center justify-center p-4" onclick="closeImgModal()">
        <img id="modalImg" class="max-w-full max-h-[90vh] rounded-lg object-contain">
        <span class="absolute top-5 right-5 text-white text-3xl cursor-pointer">&times;</span>
    </div>

    <footer class="text-center py-8 text-sm opacity-60">
        <p>所有内容由管理员手动整理更新，仅作浏览展示</p>
    </footer>

    <script>
        // ========== 配置项，修改为你的仓库信息 ==========
        const USER = "你的GitHub用户名";
        const REPO = "你的仓库名";
        const BRANCH = "main";
        // ==============================================

        // 明暗模式
        function toggleDark() {
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("dark", document.documentElement.classList.contains("dark") ? "1" : "0");
        }
        if(localStorage.getItem("dark") === "1") document.documentElement.classList.add("dark");

        // 大图弹窗
        const imgModal = document.getElementById("imgModal");
        const modalImg = document.getElementById("modalImg");
        function openImg(src) {
            modalImg.src = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@${BRANCH}/${src}`;
            imgModal.classList.remove("hidden");
        }
        function closeImgModal() {
            imgModal.classList.add("hidden");
        }

        // 读取json数据（jsDelivr国内CDN加速）
        async function loadData() {
            const loadDom = document.getElementById("loading");
            const emptyDom = document.getElementById("emptyTip");
            const box = document.getElementById("memoryBox");
            loadDom.classList.remove("hidden");
            emptyDom.classList.add("hidden");
            box.innerHTML = `<div class="absolute left-[7px] top-0 bottom-0 w-[2px] bg-gradient-to-b from-main/60 to-transparent"></div>`;

            try {
                // jsDelivr 国内稳定加速地址
                const jsonUrl = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@${BRANCH}/data/list.json`;
                const res = await fetch(jsonUrl);
                if (!res.ok) throw new Error("无数据");
                const list = await res.json();
                loadDom.classList.add("hidden");

                if (!list || list.length === 0) {
                    emptyDom.classList.remove("hidden");
                    return;
                }

                // 按日期倒序，最新的在最上面
                list.sort((a, b) => new Date(b.date) - new Date(a.date));

                list.forEach((item, idx) => {
                    const card = document.createElement("div");
                    card.className = "relative ml-6 glass rounded-2xl p-5 card-hover fade-in";
                    card.style.animationDelay = `${idx * 0.04}s`;

                    let imageHtml = "";
                    if (item.img) {
                        const imgUrl = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@${BRANCH}/${item.img}`;
                        imageHtml = `
                            <img 
                                src="${imgUrl}" 
                                class="w-full rounded-xl my-4 shadow-md cursor-pointer hover:opacity-90"
                                onclick="openImg('${item.img}')"
                            >
                        `;
                    }

                    card.innerHTML = `
                        <div class="absolute -left-10 top-6 w-4 h-4 rounded-full bg-main timeline-dot"></div>
                        <div class="flex justify-between items-start flex-wrap gap-2">
                            <h4 class="text-lg font-bold">${item.title}</h4>
                            <span class="text-xs opacity-70">${item.date}</span>
                        </div>
                        ${imageHtml}
                        <p class="mt-2 whitespace-pre-wrap opacity-90">${item.desc || "无文字记录"}</p>
                    `;
                    box.appendChild(card);
                })
            } catch (err) {
                loadDom.classList.add("hidden");
                emptyDom.classList.remove("hidden");
                console.error("数据加载失败：", err);
            }
        }

        function refreshData() {
            loadData();
        }

        window.onload = loadData;
    </script>
</body>
</html>
